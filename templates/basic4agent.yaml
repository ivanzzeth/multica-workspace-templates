autopilots:
  - title: Planner - issue卡住检测
    description: |-
      # 目标

      执行issue卡住检测工作流



      # 步骤

      1. 检查所有处于todo、in progress、in review状态的issue，你不负责将issue状态标记为done。
      2. 检查这些issue是否有负责人，没有需要分配负责人
      3. 检查这些issue是否有agent正在工作，通过issue实际run的情况来看。如果没有agent正在处理工作，继续分析，是卡在什么阶段？如果是负责人还没做完，则重新mention负责人。如果是负责人已经做完，但是没有mention QA，则你帮忙mention QA。或者mention过QA，但QA执行失败了需要重试，需要你帮忙再次mention QA。负责人或者QA是否做完取决于他是否有按照他指令里的工作流完成任务哈，如果不符合工作流要求，即便它宣称自己做完了，你也得重新mention它。 issue 上仍有 Agent 的 running / queued run 在执行，就说明有人在干活，你不需要介入。
      4. 处理完所有issue则结束工作流
    agent_ref: Planner
    mode: run_only
    triggers:
      - cron: 0-50/10 * * * *
        timezone: Asia/Shanghai
  - title: Planner — 调度issue
    description: |-
      每 10 分钟 cron 扫描。按照planner指令的工作流执行。

      步骤：

      1. 先浏览multica工作区有哪些项目
      2. 找到没有任何一个issue处于todo、in progress、in review、blocked状态的项目列表
      3. 检查这些项目是否有backlog状态的issue
      4. 如果有，则按照issue的优先级、截止日期排序，将其设置为todo状态。如果没有负责人，则分配一个负责人（通常是worker）；如果有负责人，则在挪状态后，mention负责人。
      5. 如果没有，则跳过该项目
      6. 所有项目调度完毕则结束工作流
    agent_ref: Planner
    mode: run_only
    triggers:
      - cron: 0-50/10 * * * *
        timezone: Asia/Shanghai
        label: 每10分钟（:00偏移，最先执行）
