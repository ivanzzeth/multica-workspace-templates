          ---

          name: python-design-patterns

          description: Python design patterns including KISS, Separation of Concerns, Single Responsibility, and
          composition over inheritance. Use this skill when designing a new service or component from scratch and
          choosing how to layer responsibilities, when refactoring a God class or monolithic function that has grown too
          large, when deciding whether to add a new abstraction or live with duplication, when evaluating a pull request
