          ---


          <!--

          Reference material based on OWASP Cheat Sheet Series (CC BY-SA 4.0)

          https://cheatsheetseries.owasp.org/

          -->


          # Security Review Skill


          Identify exploitable security vulnerabilities in code. Report only **HIGH CONFIDENCE** findings—clear
          vulnerable patterns with attacker-controlled input.


          ## Scope: Research vs. Reporting


          **CRITICAL DISTINCTION:**


          - **Report on**: Only the specific file, diff, or code provided by the user

          - **Research**: The ENTIRE codebase to build confidence before reporting


          Before flagging any issue, you MUST research the codebase to understand:

          - Where does this input actually come from? (Trace data flow)

          - Is there validation/sanitization elsewhere?

          - How is this configured? (Check settings, config files, middleware)

          - What framework protections exist?


          **Do NOT report issues based solely on pattern matching.** Investigate first, then report only what you're
          confident is exploitable.


          ## Confidence Levels


          | Level | Criteria | Action |

          |-------|----------|--------|

          | **HIGH** | Vulnerable pattern + attacker-controlled input confirmed | **Report** with severity |

          | **MEDIUM** | Vulnerable pattern, input source unclear | **Note** as "Needs verification" |

          | **LOW** | Theoretical, best practice, defense-in-depth | **Do not report** |


          ## Do Not Flag


          ### General Rules

          - Test files (unless explicitly reviewing test security)

          - Dead code, commented code, documentation strings

          - Patterns using **constants** or **server-controlled configuration**

          - Code paths that require prior authentication to reach (note the auth requirement instead)


          ### Server-Controlled Values (NOT Attacker-Controlled)


          These are configured by operators, not controlled by attackers:


          | Source | Example | Why It's Safe |

          |--------|---------|---------------|

          | Django settings | `settings.API_URL`, `settings.ALLOWED_HOSTS` | Set via config/env at deployment |

          | Environment variables | `os.environ.get('DATABASE_URL')` | Deployment configuration |

          | Config files | `config.yaml`, `app.config['KEY']` | Server-side files |

          | Framework constants | `django.conf.settings.*` | Not user-modifiable |

          | Hardcoded values | `BASE_URL = "https://api.internal"` | Compile-time constants |


          **SSRF Example - NOT a vulnerability:**

          ```python

          # SAFE: URL comes from Django settings (server-controlled)

          response = requests.get(f"{settings.SEER_AUTOFIX_URL}{path}")

          ```


          **SSRF Example - IS a vulnerability:**

          ```python

          # VULNERABLE: URL comes from request (attacker-controlled)

          response = requests.get(request.GET.get('url'))

          ```


          ### Framework-Mitigated Patterns

          Check language guides before flagging. Common false positives:


          | Pattern | Why It's Usually Safe |

          |---------|----------------------|

          | Django `{{ variable }}` | Auto-escaped by default |

          | React `{variable}` | Auto-escaped by default |

          | Vue `{{ variable }}` | Auto-escaped by default |

          | `User.objects.filter(id=input)` | ORM parameterizes queries |

          | `cursor.execute("...%s", (input,))` | Parameterized query |

          | `innerHTML = "<b>Loading...</b>"` | Constant string, no user input |


          **Only flag these when:**

          - Django: `{{ var|safe }}`, `{% autoescape off %}`, `mark_safe(user_input)`

          - React: `dangerouslySetInnerHTML={{__html: userInput}}`

          - Vue: `v-html="userInput"`

          - ORM: `.raw()`, `.extra()`, `RawSQL()` with string interpolation


          ## Review Process


          ### 1. Detect Context


          What type of code am I reviewing?


          | Code Type | Load These References |

          |-----------|----------------------|

          | API endpoints, routes | `authorization.md`, `authentication.md`, `injection.md` |

          | Frontend, templates | `xss.md`, `csrf.md` |

          | File handling, uploads | `file-security.md` |

          | Crypto, secrets, tokens | `cryptography.md`, `data-protection.md` |

          | Data serialization | `deserialization.md` |

          | External requests | `ssrf.md` |

          | Business workflows | `business-logic.md` |

          | GraphQL, REST design | `api-security.md` |

          | Config, headers, CORS | `misconfiguration.md` |

          | CI/CD, dependencies | `supply-chain.md` |

          | Error handling | `error-handling.md` |

          | Audit, logging | `logging.md` |


          ### 2. Load Language Guide


          Based on file extension or imports:


          | Indicators | Guide |

          |------------|-------|

          | `.py`, `django`, `flask`, `fastapi` | `languages/python.md` |

          | `.js`, `.ts`, `express`, `react`, `vue`, `next` | `languages/javascript.md` |

          | `.go`, `go.mod` | `languages/go.md` |

          | `.rs`, `Cargo.toml` | `languages/rust.md` |

          | `.java`, `spring`, `@Controller` | `languages/java.md` |


          ### 3. Load Infrastructure Guide (if applicable)


          | File Type | Guide |

          |-----------|-------|

          | `Dockerfile`, `.dockerignore` | `infrastructure/docker.md` |

          | K8s manifests, Helm charts | `infrastructure/kubernetes.md` |

          | `.tf`, Terraform | `infrastructure/terraform.md` |

          | GitHub Actions, `.gitlab-ci.yml` | `infrastructure/ci-cd.md` |

          | AWS/GCP/Azure configs, IAM | `infrastructure/cloud.md` |


          ### 4. Research Before Flagging


          **For each potential issue, research the codebase to build confidence:**


          - Where does this value actually come from? Trace the data flow.

          - Is it configured at deployment (settings, env vars) or from user input?

          - Is there validation, sanitization, or allowlisting elsewhere?

          - What framework protections apply?


          Only report issues where you have HIGH confidence after understanding the broader context.


          ### 5. Verify Exploitability


          For each potential finding, confirm:


          **Is the input attacker-controlled?**


          | Attacker-Controlled (Investigate) | Server-Controlled (Usually Safe) |

          |-----------------------------------|----------------------------------|

          | `request.GET`, `request.POST`, `request.args` | `settings.X`, `app.config['X']` |

          | `request.json`, `request.data`, `request.body` | `os.environ.get('X')` |

          | `request.headers` (most headers) | Hardcoded constants |

          | `request.cookies` (unsigned) | Internal service URLs from config |

          | URL path segments: `/users/<id>/` | Database content from admin/system |

          | File uploads (content and names) | Signed session data |

          | Database content from other users | Framework settings |

          | WebSocket messages | |


          **Does the framework mitigate this?**

          - Check language guide for auto-escaping, parameterization

          - Check for middleware/decorators that sanitize


          **Is there validation upstream?**

          - Input validation before this code

          - Sanitization libraries (DOMPurify, bleach, etc.)


          ### 6. Report HIGH Confidence Only


          Skip theoretical issues. Report only what you've confirmed is exploitable after research.


          ---


          ## Severity Classification


          | Severity | Impact | Examples |

          |----------|--------|----------|

          | **Critical** | Direct exploit, severe impact, no auth required | RCE, SQL injection to data, auth bypass,
          hardcoded secrets |

          | **High** | Exploitable with conditions, significant impact | Stored XSS, SSRF to metadata, IDOR to sensitive
          data |

          | **Medium** | Specific conditions required, moderate impact | Reflected XSS, CSRF on state-changing actions,
          path traversal |

          | **Low** | Defense-in-depth, minimal direct impact | Missing headers, verbose errors, weak algorithms in
          non-critical context |


          ---


          ## Quick Patterns Reference


          ### Always Flag (Critical)

          ```

          eval(user_input)           # Any language

          exec(user_input)           # Any language

          pickle.loads(user_data)    # Python

          yaml.load(user_data)       # Python (not safe_load)

          unserialize($user_data)    # PHP

          deserialize(user_data)     # Java ObjectInputStream

          shell=True + user_input    # Python subprocess

          child_process.exec(user)   # Node.js

          ```


          ### Always Flag (High)

          ```

          innerHTML = userInput              # DOM XSS

          dangerouslySetInnerHTML={user}     # React XSS

          v-html="userInput"                 # Vue XSS

          f"SELECT * FROM x WHERE {user}"    # SQL injection

          `SELECT * FROM x WHERE ${user}`    # SQL injection

          os.system(f"cmd {user_input}")     # Command injection

          ```


          ### Always Flag (Secrets)

          ```

          password = "hardcoded"

          api_key = "sk-..."

          AWS_SECRET_ACCESS_KEY = "..."

          private_key = "-----BEGIN"

          ```


          ### Check Context First (MUST Investigate Before Flagging)

          ```

          # SSRF - ONLY if URL is from user input, NOT from settings/config

          requests.get(request.GET['url'])     # FLAG: User-controlled URL

          requests.get(settings.API_URL)       # SAFE: Server-controlled config

          requests.get(f"{settings.BASE}/{x}") # CHECK: Is 'x' user input?


          # Path traversal - ONLY if path is from user input

          open(request.GET['file'])            # FLAG: User-controlled path

          open(settings.LOG_PATH)              # SAFE: Server-controlled config

          open(f"{BASE_DIR}/{filename}")       # CHECK: Is 'filename' user input?


          # Open redirect - ONLY if URL is from user input

          redirect(request.GET['next'])        # FLAG: User-controlled redirect

          redirect(settings.LOGIN_URL)         # SAFE: Server-controlled config


          # Weak crypto - ONLY if used for security purposes

          hashlib.md5(file_content)            # SAFE: File checksums, caching

          hashlib.md5(password)                # FLAG: Password hashing

          random.random()                      # SAFE: Non-security uses (UI, sampling)

          random.random() for token            # FLAG: Security tokens need secrets module

          ```


          ---


          ## Output Format


          ```markdown

          ## Security Review: [File/Component Name]


          ### Summary

          - **Findings**: X (Y Critical, Z High, ...)

          - **Risk Level**: Critical/High/Medium/Low

          - **Confidence**: High/Mixed


          ### Findings


          #### [VULN-001] [Vulnerability Type] (Severity)

          - **Location**: `file.py:123`

          - **Confidence**: High

          - **Issue**: [What the vulnerability is]

          - **Impact**: [What an attacker could do]

          - **Evidence**:
            ```python
            [Vulnerable code snippet]
            ```
          - **Fix**: [How to remediate]


          ### Needs Verification


          #### [VERIFY-001] [Potential Issue]

          - **Location**: `file.py:456`

          - **Question**: [What needs to be verified]

          ```


          If no vulnerabilities found, state: "No high-confidence vulnerabilities identified."


          ---


          ## Reference Files


          ### Core Vulnerabilities (`references/`)

          | File | Covers |

          |------|--------|

          | `injection.md` | SQL, NoSQL, OS command, LDAP, template injection |

          | `xss.md` | Reflected, stored, DOM-based XSS |

          | `authorization.md` | Authorization, IDOR, privilege escalation |

          | `authentication.md` | Sessions, credentials, password storage |

          | `cryptography.md` | Algorithms, key management, randomness |

          | `deserialization.md` | Pickle, YAML, Java, PHP deserialization |

          | `file-security.md` | Path traversal, uploads, XXE |

          | `ssrf.md` | Server-side request forgery |

          | `csrf.md` | Cross-site request forgery |

          | `data-protection.md` | Secrets exposure, PII, logging |

          | `api-security.md` | REST, GraphQL, mass assignment |

          | `business-logic.md` | Race conditions, workflow bypass |

          | `modern-threats.md` | Prototype pollution, LLM injection, WebSocket |

          | `misconfiguration.md` | Headers, CORS, debug mode, defaults |

          | `error-handling.md` | Fail-open, information disclosure |

          | `supply-chain.md` | Dependencies, build security |

          | `logging.md` | Audit failures, log injection |


          ### Language Guides (`languages/`)

          - `python.md` - Django, Flask, FastAPI patterns

          - `javascript.md` - Node, Express, React, Vue, Next.js

          - `go.md` - Go-specific security patterns

          - `rust.md` - Rust unsafe blocks, FFI security

          - `java.md` - Spring, Java EE patterns


          ### Infrastructure (`infrastructure/`)

          - `docker.md` - Container security

          - `kubernetes.md` - K8s RBAC, secrets, policies

          - `terraform.md` - IaC security

          - `ci-cd.md` - Pipeline security

          - `cloud.md` - AWS/GCP/Azure security
  - name: shadcn
    description: Manages shadcn components and projects — adding, searching, fixing, debugging, styling, and composing UI.
      Provides project context, component docs, and usage examples. Applies when working with shadcn/ui, component
      registries, presets, --preset codes, or any project with a components.json file. Also triggers for "shadcn init",
      "create an app with --preset", or "switch to --preset".
    config:
      origin:
        owner: shadcn
        repo: ui
        skill: shadcn
        source_url: https://www.skills.sh/shadcn/ui/shadcn
        type: skills_sh
    files:
      - path: SKILL.md
        content: >
          ---

          name: shadcn

          description: Manages shadcn components and projects — adding, searching, fixing, debugging, styling, and
          composing UI. Provides project context, component docs, and usage examples. Applies when working with
          shadcn/ui, component registries, presets, --preset codes, or any project with a components.json file. Also
          triggers for "shadcn init", "create an app with --preset", or "switch to --preset".

          user-invocable: false

          allowed-tools: Bash(npx shadcn@latest *), Bash(pnpm dlx shadcn@latest *), Bash(bunx --bun shadcn@latest *)

          ---


          # shadcn/ui


          A framework for building ui, components and design systems. Components are added as source code to the user's
          project via the CLI.


          > **IMPORTANT:** Run all CLI commands using the project's package runner: `npx shadcn@latest`, `pnpm dlx
          shadcn@latest`, or `bunx --bun shadcn@latest` — based on the project's `packageManager`. Examples below use
          `npx shadcn@latest` but substitute the correct runner for the project.


          ## Current Project Context


          ```json

          !`npx shadcn@latest info --json`

          ```


          The JSON above contains the project config and installed components. Use `npx shadcn@latest docs <component>`
          to get documentation and example URLs for any component.


          ## Principles


          1. **Use existing components first.** Use `npx shadcn@latest search` to check registries before writing custom
          UI. Check community registries too.

          2. **Compose, don't reinvent.** Settings page = Tabs + Card + form controls. Dashboard = Sidebar + Card +
          Chart + Table.

          3. **Use built-in variants before custom styles.** `variant="outline"`, `size="sm"`, etc.

          4. **Use semantic colors.** `bg-primary`, `text-muted-foreground` — never raw values like `bg-blue-500`.


          ## Critical Rules


          These rules are **always enforced**. Each links to a file with Incorrect/Correct code pairs.


          ### Styling & Tailwind → [styling.md](./rules/styling.md)


          - **`className` for layout, not styling.** Never override component colors or typography.

          - **No `space-x-*` or `space-y-*`.** Use `flex` with `gap-*`. For vertical stacks, `flex flex-col gap-*`.

          - **Use `size-*` when width and height are equal.** `size-10` not `w-10 h-10`.

          - **Use `truncate` shorthand.** Not `overflow-hidden text-ellipsis whitespace-nowrap`.

          - **No manual `dark:` color overrides.** Use semantic tokens (`bg-background`, `text-muted-foreground`).

          - **Use `cn()` for conditional classes.** Don't write manual template literal ternaries.

          - **No manual `z-index` on overlay components.** Dialog, Sheet, Popover, etc. handle their own stacking.


          ### Forms & Inputs → [forms.md](./rules/forms.md)


          - **Forms use `FieldGroup` + `Field`.** Never use raw `div` with `space-y-*` or `grid gap-*` for form layout.

          - **`InputGroup` uses `InputGroupInput`/`InputGroupTextarea`.** Never raw `Input`/`Textarea` inside
          `InputGroup`.

          - **Buttons inside inputs use `InputGroup` + `InputGroupAddon`.**

          - **Option sets (2–7 choices) use `ToggleGroup`.** Don't loop `Button` with manual active state.

          - **`FieldSet` + `FieldLegend` for grouping related checkboxes/radios.** Don't use a `div` with a heading.

          - **Field validation uses `data-invalid` + `aria-invalid`.** `data-invalid` on `Field`, `aria-invalid` on the
          control. For disabled: `data-disabled` on `Field`, `disabled` on the control.


          ### Component Structure → [composition.md](./rules/composition.md)


          - **Items always inside their Group.** `SelectItem` → `SelectGroup`. `DropdownMenuItem` → `DropdownMenuGroup`.
          `CommandItem` → `CommandGroup`.

          - **Use `asChild` (radix) or `render` (base) for custom triggers.** Check `base` field from `npx shadcn@latest
          info`. → [base-vs-radix.md](./rules/base-vs-radix.md)

          - **Dialog, Sheet, and Drawer always need a Title.** `DialogTitle`, `SheetTitle`, `DrawerTitle` required for
          accessibility. Use `className="sr-only"` if visually hidden.

          - **Use full Card composition.** `CardHeader`/`CardTitle`/`CardDescription`/`CardContent`/`CardFooter`. Don't
          dump everything in `CardContent`.

          - **Button has no `isPending`/`isLoading`.** Compose with `Spinner` + `data-icon` + `disabled`.

          - **`TabsTrigger` must be inside `TabsList`.** Never render triggers directly in `Tabs`.

          - **`Avatar` always needs `AvatarFallback`.** For when the image fails to load.


          ### Use Components, Not Custom Markup → [composition.md](./rules/composition.md)


          - **Use existing components before custom markup.** Check if a component exists before writing a styled `div`.

          - **Callouts use `Alert`.** Don't build custom styled divs.

          - **Empty states use `Empty`.** Don't build custom empty state markup.

          - **Toast via `sonner`.** Use `toast()` from `sonner`.

          - **Use `Separator`** instead of `<hr>` or `<div className="border-t">`.

          - **Use `Skeleton`** for loading placeholders. No custom `animate-pulse` divs.

          - **Use `Badge`** instead of custom styled spans.


          ### Icons → [icons.md](./rules/icons.md)


          - **Icons in `Button` use `data-icon`.** `data-icon="inline-start"` or `data-icon="inline-end"` on the icon.

          - **No sizing classes on icons inside components.** Components handle icon sizing via CSS. No `size-4` or `w-4
          h-4`.

          - **Pass icons as objects, not string keys.** `icon={CheckIcon}`, not a string lookup.


          ### CLI


          - **Never decode preset codes or build preset URLs manually.** Use `npx shadcn@latest preset decode <code>`,
          `preset url <code>`, or `preset open <code>`. For project-aware preset detection, use `npx shadcn@latest
          preset resolve`.

          - **Apply preset codes directly with the CLI.** Use `npx shadcn@latest apply <code>` for existing projects, or
          `npx shadcn@latest init --preset <code>` when initializing.


          ## Key Patterns


          These are the most common patterns that differentiate correct shadcn/ui code. For edge cases, see the linked
          rule files above.


          ```tsx

          // Form layout: FieldGroup + Field, not div + Label.

          <FieldGroup>
            <Field>
              <FieldLabel htmlFor="email">Email</FieldLabel>
              <Input id="email" />
            </Field>
          </FieldGroup>


          // Validation: data-invalid on Field, aria-invalid on the control.

          <Field data-invalid>
            <FieldLabel>Email</FieldLabel>
            <Input aria-invalid />
            <FieldDescription>Invalid email.</FieldDescription>
          </Field>


          // Icons in buttons: data-icon, no sizing classes.

          <Button>
            <SearchIcon data-icon="inline-start" />
            Search
          </Button>


          // Spacing: gap-*, not space-y-*.

          <div className="flex flex-col gap-4">  // correct

          <div className="space-y-4">           // wrong


          // Equal dimensions: size-*, not w-* h-*.

          <Avatar className="size-10">   // correct

          <Avatar className="w-10 h-10"> // wrong


          // Status colors: Badge variants or semantic tokens, not raw colors.

          <Badge variant="secondary">+20.1%</Badge>    // correct

          <span className="text-emerald-600">+20.1%</span> // wrong

          ```


          ## Component Selection


          | Need                       |
          Use                                                                                                 |

          | -------------------------- |
          --------------------------------------------------------------------------------------------------- |

          | Button/action              | `Button` with appropriate
          variant                                                                   |

          | Form inputs                | `Input`, `Select`, `Combobox`, `Switch`, `Checkbox`, `RadioGroup`, `Textarea`,
          `InputOTP`, `Slider` |

          | Toggle between 2–5 options | `ToggleGroup` +
          `ToggleGroupItem`                                                                   |

          | Data display               | `Table`, `Card`, `Badge`,
          `Avatar`                                                                  |

          | Navigation                 | `Sidebar`, `NavigationMenu`, `Breadcrumb`, `Tabs`,
          `Pagination`                                     |

          | Overlays                   | `Dialog` (modal), `Sheet` (side panel), `Drawer` (bottom sheet), `AlertDialog`
          (confirmation)       |

          | Feedback                   | `sonner` (toast), `Alert`, `Progress`, `Skeleton`,
          `Spinner`                                        |

          | Command palette            | `Command` inside
          `Dialog`                                                                           |

          | Charts                     | `Chart` (wraps
          Recharts)                                                                            |

          | Layout                     | `Card`, `Separator`, `Resizable`, `ScrollArea`, `Accordion`,
          `Collapsible`                          |

          | Empty states               |
          `Empty`                                                                                             |

          | Menus                      | `DropdownMenu`, `ContextMenu`,
          `Menubar`                                                            |

          | Tooltips/info              | `Tooltip`, `HoverCard`,
          `Popover`                                                                   |


          ## Key Fields


          The injected project context contains these key fields:


          - **`aliases`** → use the actual alias prefix for imports (e.g. `@/`, `~/`), never hardcode.

          - **`isRSC`** → when `true`, components using `useState`, `useEffect`, event handlers, or browser APIs need
          `"use client"` at the top of the file. Always reference this field when advising on the directive.

          - **`tailwindVersion`** → `"v4"` uses `@theme inline` blocks; `"v3"` uses `tailwind.config.js`.

          - **`tailwindCssFile`** → the global CSS file where custom CSS variables are defined. Always edit this file,
          never create a new one.

          - **`style`** → component visual treatment (e.g. `nova`, `vega`).

          - **`base`** → primitive library (`radix` or `base`). Affects component APIs and available props.

          - **`iconLibrary`** → determines icon imports. Use `lucide-react` for `lucide`, `@tabler/icons-react` for
          `tabler`, etc. Never assume `lucide-react`.

          - **`resolvedPaths`** → exact file-system destinations for components, utils, hooks, etc.

          - **`framework`** → routing and file conventions (e.g. Next.js App Router vs Vite SPA).

          - **`packageManager`** → use this for any non-shadcn dependency installs (e.g. `pnpm add date-fns` vs `npm
          install date-fns`).

          - **`preset`** → resolved preset code and values for the current project. Use `npx shadcn@latest preset
          resolve --json` when you only need preset information.


          See [cli.md — `info` command](./cli.md) for the full field reference.


          ## Component Docs, Examples, and Usage


          Run `npx shadcn@latest docs <component>` to get the URLs for a component's documentation, examples, and API
          reference. Fetch these URLs to get the actual content.


          ```bash

          npx shadcn@latest docs button dialog select

          ```


          **When creating, fixing, debugging, or using a component, always run `npx shadcn@latest docs` and fetch the
          URLs first.** This ensures you're working with the correct API and usage patterns rather than guessing.


          ## Workflow


          1. **Get project context** — already injected above. Run `npx shadcn@latest info` again if you need to
          refresh.

          2. **Check installed components first** — before running `add`, always check the `components` list from
          project context or list the `resolvedPaths.ui` directory. Don't import components that haven't been added, and
          don't re-add ones already installed.

          3. **Find components** — `npx shadcn@latest search`.

          4. **Get docs and examples** — run `npx shadcn@latest docs <component>` to get URLs, then fetch them. Use `npx
          shadcn@latest view` to browse registry items you haven't installed. To preview changes to installed
          components, use `npx shadcn@latest add --diff`.

          5. **Install or update** — `npx shadcn@latest add`. When updating existing components, use `--dry-run` and
          `--diff` to preview changes first (see [Updating Components](#updating-components) below).

          6. **Fix imports in third-party components** — After adding components from community registries (e.g.
          `@bundui`, `@magicui`), check the added non-UI files for hardcoded import paths like `@/components/ui/...`.
          These won't match the project's actual aliases. Use `npx shadcn@latest info` to get the correct `ui` alias
          (e.g. `@workspace/ui/components`) and rewrite the imports accordingly. The CLI rewrites imports for its own UI
          files, but third-party registry components may use default paths that don't match the project.

          7. **Review added components** — After adding a component or block from any registry, **always read the added
          files and verify they are correct**. Check for missing sub-components (e.g. `SelectItem` without
          `SelectGroup`), missing imports, incorrect composition, or violations of the [Critical
          Rules](#critical-rules). Also replace any icon imports with the project's `iconLibrary` from the project
          context (e.g. if the registry item uses `lucide-react` but the project uses `hugeicons`, swap the imports and
          icon names accordingly). Fix all issues before moving on.

          8. **Registry must be explicit** — When the user asks to add a block or component, **do not guess the
          registry**. If no registry is specified (e.g. user says "add a login block" without specifying `@shadcn`,
          `@tailark`, etc.), ask which registry to use. Never default to a registry on behalf of the user.

          9. **Switching presets** — Ask the user first: **overwrite**, **partial**, **merge**, or **skip**?
             - **Inspect current preset**: `npx shadcn@latest preset resolve`. Use `--json` when you need structured values.
             - **Inspect incoming preset**: `npx shadcn@latest preset decode <code>`. Use `preset url <code>` or `preset open <code>` to share or open the preset builder.
             - **Overwrite**: `npx shadcn@latest apply <code>`. Overwrites detected components, fonts, and CSS variables.
             - **Partial**: `npx shadcn@latest apply <code> --only theme,font`. Updates only the selected preset parts without reinstalling UI components. Supported values are `theme` and `font`; comma-separated combinations are allowed. `icon` is intentionally not supported, because icon changes may require full component reinstall and transforms.
             - **Merge**: `npx shadcn@latest init --preset <code> --force --no-reinstall`, then run `npx shadcn@latest info` to list installed components, then for each installed component use `--dry-run` and `--diff` to [smart merge](#updating-components) it individually.
             - **Skip**: `npx shadcn@latest init --preset <code> --force --no-reinstall`. Only updates config and CSS, leaves components as-is.
             - **Important**: Always run preset commands inside the user's project directory. `apply` only works in an existing project with a `components.json` file. The CLI automatically preserves the current base (`base` vs `radix`) from `components.json`. If you must use a scratch/temp directory (e.g. for `--dry-run` comparisons), pass `--base <current-base>` explicitly — preset codes do not encode the base.

          ## Updating Components


          When the user asks to update a component from upstream while keeping their local changes, use `--dry-run` and
          `--diff` to intelligently merge. **NEVER fetch raw files from GitHub manually — always use the CLI.**


          1. Run `npx shadcn@latest add <component> --dry-run` to see all files that would be affected.

          2. For each file, run `npx shadcn@latest add <component> --diff <file>` to see what changed upstream vs local.

          3. Decide per file based on the diff:
             - No local changes → safe to overwrite.
             - Has local changes → read the local file, analyze the diff, and apply upstream updates while preserving local modifications.
             - User says "just update everything" → use `--overwrite`, but confirm first.
          4. **Never use `--overwrite` without the user's explicit approval.**


          ## Quick Reference


          ```bash

          # Create a new project.

          npx shadcn@latest init --name my-app --preset base-nova

          npx shadcn@latest init --name my-app --preset a2r6bw --template vite


          # Create a monorepo project.

          npx shadcn@latest init --name my-app --preset base-nova --monorepo

          npx shadcn@latest init --name my-app --preset base-nova --template next --monorepo


          # Initialize existing project.

          npx shadcn@latest init --preset base-nova

          npx shadcn@latest init --defaults  # shortcut: --template=next --preset=nova (base style implied)


          # Apply a preset to an existing project.

          npx shadcn@latest apply a2r6bw

          npx shadcn@latest apply a2r6bw --only theme

          npx shadcn@latest apply a2r6bw --only font

          npx shadcn@latest apply a2r6bw --only theme,font


          # Inspect preset codes and project preset state.

          npx shadcn@latest preset decode a2r6bw

          npx shadcn@latest preset url a2r6bw

          npx shadcn@latest preset open a2r6bw

          npx shadcn@latest preset resolve

          npx shadcn@latest preset resolve --json


          # Add components.

          npx shadcn@latest add button card dialog

          npx shadcn@latest add @magicui/shimmer-button

          npx shadcn@latest add --all


          # Preview changes before adding/updating.

          npx shadcn@latest add button --dry-run

          npx shadcn@latest add button --diff button.tsx

          npx shadcn@latest add @acme/form --view button.tsx


          # Search registries.

          npx shadcn@latest search @shadcn -q "sidebar"

          npx shadcn@latest search @tailark -q "stats"


          # Get component docs and example URLs.

          npx shadcn@latest docs button dialog select


          # View registry item details (for items not yet installed).

          npx shadcn@latest view @shadcn/button

          ```


          **Named presets:** `nova`, `vega`, `maia`, `lyra`, `mira`, `luma`

          **Templates:** `next`, `vite`, `start`, `react-router`, `astro` (all support `--monorepo`) and `laravel` (not
          supported for monorepo)

          **Preset codes:** Version-prefixed base62 strings (e.g. `a2r6bw` or `b0`), from
          [ui.shadcn.com](https://ui.shadcn.com).


          ## Detailed References


          - [rules/forms.md](./rules/forms.md) — FieldGroup, Field, InputGroup, ToggleGroup, FieldSet, validation states

          - [rules/composition.md](./rules/composition.md) — Groups, overlays, Card, Tabs, Avatar, Alert, Empty, Toast,
          Separator, Skeleton, Badge, Button loading

          - [rules/icons.md](./rules/icons.md) — data-icon, icon sizing, passing icons as objects

          - [rules/styling.md](./rules/styling.md) — Semantic colors, variants, className, spacing, size, truncate, dark
          mode, cn(), z-index

          - [rules/base-vs-radix.md](./rules/base-vs-radix.md) — asChild vs render, Select, ToggleGroup, Slider,
          Accordion

          - [cli.md](./cli.md) — Commands, flags, presets, templates

          - [customization.md](./customization.md) — Theming, CSS variables, extending components
  - name: skill-creator
    description: Create new skills, modify and improve existing skills, and measure skill performance. Use when users want
      to create a skill from scratch, edit, or optimize an existing skill, run evals to test a skill, benchmark skill
      performance with variance analysis, or optimize a skill's description for better triggering accuracy.
    config:
      origin:
        owner: anthropics
        repo: skills
        skill: skill-creator
        source_url: https://www.skills.sh/anthropics/skills/skill-creator
        type: skills_sh
    files:
      - path: SKILL.md
        content: >
          ---

          name: skill-creator

          description: Create new skills, modify and improve existing skills, and measure skill performance. Use when
          users want to create a skill from scratch, edit, or optimize an existing skill, run evals to test a skill,
          benchmark skill performance with variance analysis, or optimize a skill's description for better triggering
          accuracy.

          ---


          # Skill Creator


          A skill for creating new skills and iteratively improving them.


          At a high level, the process of creating a skill goes like this:


          - Decide what you want the skill to do and roughly how it should do it

          - Write a draft of the skill

          - Create a few test prompts and run claude-with-access-to-the-skill on them

          - Help the user evaluate the results both qualitatively and quantitatively
            - While the runs happen in the background, draft some quantitative evals if there aren't any (if there are some, you can either use as is or modify if you feel something needs to change about them). Then explain them to the user (or if they already existed, explain the ones that already exist)
            - Use the `eval-viewer/generate_review.py` script to show the user the results for them to look at, and also let them look at the quantitative metrics
          - Rewrite the skill based on feedback from the user's evaluation of the results (and also if there are any
          glaring flaws that become apparent from the quantitative benchmarks)

          - Repeat until you're satisfied

          - Expand the test set and try again at larger scale


          Your job when using this skill is to figure out where the user is in this process and then jump in and help
          them progress through these stages. So for instance, maybe they're like "I want to make a skill for X". You
          can help narrow down what they mean, write a draft, write the test cases, figure out how they want to
          evaluate, run all the prompts, and repeat.


          On the other hand, maybe they already have a draft of the skill. In this case you can go straight to the
          eval/iterate part of the loop.


          Of course, you should always be flexible and if the user is like "I don't need to run a bunch of evaluations,
          just vibe with me", you can do that instead.


          Then after the skill is done (but again, the order is flexible), you can also run the skill description
          improver, which we have a whole separate script for, to optimize the triggering of the skill.


          Cool? Cool.


          ## Communicating with the user


          The skill creator is liable to be used by people across a wide range of familiarity with coding jargon. If you
          haven't heard (and how could you, it's only very recently that it started), there's a trend now where the
          power of Claude is inspiring plumbers to open up their terminals, parents and grandparents to google "how to
          install npm". On the other hand, the bulk of users are probably fairly computer-literate.


          So please pay attention to context cues to understand how to phrase your communication! In the default case,
          just to give you some idea:


          - "evaluation" and "benchmark" are borderline, but OK

          - for "JSON" and "assertion" you want to see serious cues from the user that they know what those things are
          before using them without explaining them


          It's OK to briefly explain terms if you're in doubt, and feel free to clarify terms with a short definition if
          you're unsure if the user will get it.


          ---


          ## Creating a skill


          ### Capture Intent


          Start by understanding the user's intent. The current conversation might already contain a workflow the user
          wants to capture (e.g., they say "turn this into a skill"). If so, extract answers from the conversation
          history first — the tools used, the sequence of steps, corrections the user made, input/output formats
          observed. The user may need to fill the gaps, and should confirm before proceeding to the next step.


          1. What should this skill enable Claude to do?

          2. When should this skill trigger? (what user phrases/contexts)

          3. What's the expected output format?

          4. Should we set up test cases to verify the skill works? Skills with objectively verifiable outputs (file
          transforms, data extraction, code generation, fixed workflow steps) benefit from test cases. Skills with
          subjective outputs (writing style, art) often don't need them. Suggest the appropriate default based on the
          skill type, but let the user decide.


          ### Interview and Research


          Proactively ask questions about edge cases, input/output formats, example files, success criteria, and
          dependencies. Wait to write test prompts until you've got this part ironed out.


          Check available MCPs - if useful for research (searching docs, finding similar skills, looking up best
          practices), research in parallel via subagents if available, otherwise inline. Come prepared with context to
          reduce burden on the user.


          ### Write the SKILL.md


          Based on the user interview, fill in these components:


          - **name**: Skill identifier

          - **description**: When to trigger, what it does. This is the primary triggering mechanism - include both what
          the skill does AND specific contexts for when to use it. All "when to use" info goes here, not in the body.
          Note: currently Claude has a tendency to "undertrigger" skills -- to not use them when they'd be useful. To
          combat this, please make the skill descriptions a little bit "pushy". So for instance, instead of "How to
          build a simple fast dashboard to display internal Anthropic data.", you might write "How to build a simple
          fast dashboard to display internal Anthropic data. Make sure to use this skill whenever the user mentions
          dashboards, data visualization, internal metrics, or wants to display any kind of company data, even if they
          don't explicitly ask for a 'dashboard.'"

          - **compatibility**: Required tools, dependencies (optional, rarely needed)

          - **the rest of the skill :)**


          ### Skill Writing Guide


          #### Anatomy of a Skill


          ```

          skill-name/

          ├── SKILL.md (required)

          │   ├── YAML frontmatter (name, description required)

          │   └── Markdown instructions

          └── Bundled Resources (optional)
              ├── scripts/    - Executable code for deterministic/repetitive tasks
              ├── references/ - Docs loaded into context as needed
              └── assets/     - Files used in output (templates, icons, fonts)
          ```


          #### Progressive Disclosure


          Skills use a three-level loading system:

          1. **Metadata** (name + description) - Always in context (~100 words)

          2. **SKILL.md body** - In context whenever skill triggers (<500 lines ideal)

          3. **Bundled resources** - As needed (unlimited, scripts can execute without loading)


          These word counts are approximate and you can feel free to go longer if needed.


          **Key patterns:**

          - Keep SKILL.md under 500 lines; if you're approaching this limit, add an additional layer of hierarchy along
          with clear pointers about where the model using the skill should go next to follow up.

          - Reference files clearly from SKILL.md with guidance on when to read them

          - For large reference files (>300 lines), include a table of contents


          **Domain organization**: When a skill supports multiple domains/frameworks, organize by variant:

          ```

          cloud-deploy/

          ├── SKILL.md (workflow + selection)

          └── references/
              ├── aws.md
              ├── gcp.md
              └── azure.md
          ```

          Claude reads only the relevant reference file.


          #### Principle of Lack of Surprise


          This goes without saying, but skills must not contain malware, exploit code, or any content that could
          compromise system security. A skill's contents should not surprise the user in their intent if described.
          Don't go along with requests to create misleading skills or skills designed to facilitate unauthorized access,
          data exfiltration, or other malicious activities. Things like a "roleplay as an XYZ" are OK though.


          #### Writing Patterns


          Prefer using the imperative form in instructions.


          **Defining output formats** - You can do it like this:

          ```markdown

          ## Report structure

          ALWAYS use this exact template:

          # [Title]

          ## Executive summary

          ## Key findings

          ## Recommendations

          ```


          **Examples pattern** - It's useful to include examples. You can format them like this (but if "Input" and
          "Output" are in the examples you might want to deviate a little):

          ```markdown

          ## Commit message format

          **Example 1:**

          Input: Added user authentication with JWT tokens

          Output: feat(auth): implement JWT-based authentication

          ```


          ### Writing Style


          Try to explain to the model why things are important in lieu of heavy-handed musty MUSTs. Use theory of mind
          and try to make the skill general and not super-narrow to specific examples. Start by writing a draft and then
          look at it with fresh eyes and improve it.


          ### Test Cases


          After writing the skill draft, come up with 2-3 realistic test prompts — the kind of thing a real user would
          actually say. Share them with the user: [you don't have to use this exact language] "Here are a few test cases
          I'd like to try. Do these look right, or do you want to add more?" Then run them.


          Save test cases to `evals/evals.json`. Don't write assertions yet — just the prompts. You'll draft assertions
          in the next step while the runs are in progress.


          ```json

          {
            "skill_name": "example-skill",
            "evals": [
              {
                "id": 1,
                "prompt": "User's task prompt",
                "expected_output": "Description of expected result",
                "files": []
              }
            ]
          }

          ```


          See `references/schemas.md` for the full schema (including the `assertions` field, which you'll add later).


          ## Running and evaluating test cases


          This section is one continuous sequence — don't stop partway through. Do NOT use `/skill-test` or any other
          testing skill.


          Put results in `<skill-name>-workspace/` as a sibling to the skill directory. Within the workspace, organize
          results by iteration (`iteration-1/`, `iteration-2/`, etc.) and within that, each test case gets a directory
          (`eval-0/`, `eval-1/`, etc.). Don't create all of this upfront — just create directories as you go.


          ### Step 1: Spawn all runs (with-skill AND baseline) in the same turn


          For each test case, spawn two subagents in the same turn — one with the skill, one without. This is important:
          don't spawn the with-skill runs first and then come back for baselines later. Launch everything at once so it
          all finishes around the same time.


          **With-skill run:**


          ```

          Execute this task:

          - Skill path: <path-to-skill>

          - Task: <eval prompt>

          - Input files: <eval files if any, or "none">

          - Save outputs to: <workspace>/iteration-<N>/eval-<ID>/with_skill/outputs/

          - Outputs to save: <what the user cares about — e.g., "the .docx file", "the final CSV">

          ```


          **Baseline run** (same prompt, but the baseline depends on context):

          - **Creating a new skill**: no skill at all. Same prompt, no skill path, save to `without_skill/outputs/`.

          - **Improving an existing skill**: the old version. Before editing, snapshot the skill (`cp -r <skill-path>
          <workspace>/skill-snapshot/`), then point the baseline subagent at the snapshot. Save to `old_skill/outputs/`.


          Write an `eval_metadata.json` for each test case (assertions can be empty for now). Give each eval a
          descriptive name based on what it's testing — not just "eval-0". Use this name for the directory too. If this
          iteration uses new or modified eval prompts, create these files for each new eval directory — don't assume
          they carry over from previous iterations.


          ```json

          {
            "eval_id": 0,
            "eval_name": "descriptive-name-here",
            "prompt": "The user's task prompt",
            "assertions": []
          }

          ```


          ### Step 2: While runs are in progress, draft assertions


          Don't just wait for the runs to finish — you can use this time productively. Draft quantitative assertions for
          each test case and explain them to the user. If assertions already exist in `evals/evals.json`, review them
          and explain what they check.


          Good assertions are objectively verifiable and have descriptive names — they should read clearly in the
          benchmark viewer so someone glancing at the results immediately understands what each one checks. Subjective
          skills (writing style, design quality) are better evaluated qualitatively — don't force assertions onto things
          that need human judgment.


          Update the `eval_metadata.json` files and `evals/evals.json` with the assertions once drafted. Also explain to
          the user what they'll see in the viewer — both the qualitative outputs and the quantitative benchmark.


          ### Step 3: As runs complete, capture timing data


          When each subagent task completes, you receive a notification containing `total_tokens` and `duration_ms`.
          Save this data immediately to `timing.json` in the run directory:


          ```json

          {
            "total_tokens": 84852,
            "duration_ms": 23332,
            "total_duration_seconds": 23.3
          }

          ```


          This is the only opportunity to capture this data — it comes through the task notification and isn't persisted
          elsewhere. Process each notification as it arrives rather than trying to batch them.


          ### Step 4: Grade, aggregate, and launch the viewer


          Once all runs are done:


          1. **Grade each run** — spawn a grader subagent (or grade inline) that reads `agents/grader.md` and evaluates
          each assertion against the outputs. Save results to `grading.json` in each run directory. The grading.json
          expectations array must use the fields `text`, `passed`, and `evidence` (not `name`/`met`/`details` or other
          variants) — the viewer depends on these exact field names. For assertions that can be checked
          programmatically, write and run a script rather than eyeballing it — scripts are faster, more reliable, and
          can be reused across iterations.


          2. **Aggregate into benchmark** — run the aggregation script from the skill-creator directory:
             ```bash
             python -m scripts.aggregate_benchmark <workspace>/iteration-N --skill-name <name>
             ```
             This produces `benchmark.json` and `benchmark.md` with pass_rate, time, and tokens for each configuration, with mean ± stddev and the delta. If generating benchmark.json manually, see `references/schemas.md` for the exact schema the viewer expects.
          Put each with_skill version before its baseline counterpart.


          3. **Do an analyst pass** — read the benchmark data and surface patterns the aggregate stats might hide. See
          `agents/analyzer.md` (the "Analyzing Benchmark Results" section) for what to look for — things like assertions
          that always pass regardless of skill (non-discriminating), high-variance evals (possibly flaky), and
          time/token tradeoffs.


          4. **Launch the viewer** with both qualitative outputs and quantitative data:
             ```bash
             nohup python <skill-creator-path>/eval-viewer/generate_review.py \
               <workspace>/iteration-N \
               --skill-name "my-skill" \
               --benchmark <workspace>/iteration-N/benchmark.json \
               > /dev/null 2>&1 &
             VIEWER_PID=$!
             ```
             For iteration 2+, also pass `--previous-workspace <workspace>/iteration-<N-1>`.

             **Cowork / headless environments:** If `webbrowser.open()` is not available or the environment has no display, use `--static <output_path>` to write a standalone HTML file instead of starting a server. Feedback will be downloaded as a `feedback.json` file when the user clicks "Submit All Reviews". After download, copy `feedback.json` into the workspace directory for the next iteration to pick up.

          Note: please use generate_review.py to create the viewer; there's no need to write custom HTML.


          5. **Tell the user** something like: "I've opened the results in your browser. There are two tabs — 'Outputs'
          lets you click through each test case and leave feedback, 'Benchmark' shows the quantitative comparison. When
          you're done, come back here and let me know."


          ### What the user sees in the viewer


          The "Outputs" tab shows one test case at a time:

          - **Prompt**: the task that was given

          - **Output**: the files the skill produced, rendered inline where possible

          - **Previous Output** (iteration 2+): collapsed section showing last iteration's output

          - **Formal Grades** (if grading was run): collapsed section showing assertion pass/fail

          - **Feedback**: a textbox that auto-saves as they type

          - **Previous Feedback** (iteration 2+): their comments from last time, shown below the textbox


          The "Benchmark" tab shows the stats summary: pass rates, timing, and token usage for each configuration, with
          per-eval breakdowns and analyst observations.


          Navigation is via prev/next buttons or arrow keys. When done, they click "Submit All Reviews" which saves all
          feedback to `feedback.json`.


          ### Step 5: Read the feedback


          When the user tells you they're done, read `feedback.json`:


          ```json

          {
            "reviews": [
              {"run_id": "eval-0-with_skill", "feedback": "the chart is missing axis labels", "timestamp": "..."},
              {"run_id": "eval-1-with_skill", "feedback": "", "timestamp": "..."},
              {"run_id": "eval-2-with_skill", "feedback": "perfect, love this", "timestamp": "..."}
            ],
            "status": "complete"
          }

          ```


          Empty feedback means the user thought it was fine. Focus your improvements on the test cases where the user
          had specific complaints.


          Kill the viewer server when you're done with it:


          ```bash

          kill $VIEWER_PID 2>/dev/null

          ```


          ---


          ## Improving the skill


          This is the heart of the loop. You've run the test cases, the user has reviewed the results, and now you need
          to make the skill better based on their feedback.


          ### How to think about improvements


          1. **Generalize from the feedback.** The big picture thing that's happening here is that we're trying to
          create skills that can be used a million times (maybe literally, maybe even more who knows) across many
          different prompts. Here you and the user are iterating on only a few examples over and over again because it
          helps move faster. The user knows these examples in and out and it's quick for them to assess new outputs. But
          if the skill you and the user are codeveloping works only for those examples, it's useless. Rather than put in
          fiddly overfitty changes, or oppressively constrictive MUSTs, if there's some stubborn issue, you might try
          branching out and using different metaphors, or recommending different patterns of working. It's relatively
          cheap to try and maybe you'll land on something great.


          2. **Keep the prompt lean.** Remove things that aren't pulling their weight. Make sure to read the
          transcripts, not just the final outputs — if it looks like the skill is making the model waste a bunch of time
          doing things that are unproductive, you can try getting rid of the parts of the skill that are making it do
          that and seeing what happens.


          3. **Explain the why.** Try hard to explain the **why** behind everything you're asking the model to do.
          Today's LLMs are *smart*. They have good theory of mind and when given a good harness can go beyond rote
          instructions and really make things happen. Even if the feedback from the user is terse or frustrated, try to
          actually understand the task and why the user is writing what they wrote, and what they actually wrote, and
          then transmit this understanding into the instructions. If you find yourself writing ALWAYS or NEVER in all
          caps, or using super rigid structures, that's a yellow flag — if possible, reframe and explain the reasoning
          so that the model understands why the thing you're asking for is important. That's a more humane, powerful,
          and effective approach.


          4. **Look for repeated work across test cases.** Read the transcripts from the test runs and notice if the
          subagents all independently wrote similar helper scripts or took the same multi-step approach to something. If
          all 3 test cases resulted in the subagent writing a `create_docx.py` or a `build_chart.py`, that's a strong
          signal the skill should bundle that script. Write it once, put it in `scripts/`, and tell the skill to use it.
          This saves every future invocation from reinventing the wheel.


          This task is pretty important (we are trying to create billions a year in economic value here!) and your
          thinking time is not the blocker; take your time and really mull things over. I'd suggest writing a draft
          revision and then looking at it anew and making improvements. Really do your best to get into the head of the
          user and understand what they want and need.


          ### The iteration loop


          After improving the skill:


          1. Apply your improvements to the skill

          2. Rerun all test cases into a new `iteration-<N+1>/` directory, including baseline runs. If you're creating a
          new skill, the baseline is always `without_skill` (no skill) — that stays the same across iterations. If
          you're improving an existing skill, use your judgment on what makes sense as the baseline: the original
          version the user came in with, or the previous iteration.

          3. Launch the reviewer with `--previous-workspace` pointing at the previous iteration

          4. Wait for the user to review and tell you they're done

          5. Read the new feedback, improve again, repeat


          Keep going until:

          - The user says they're happy

          - The feedback is all empty (everything looks good)

          - You're not making meaningful progress


          ---


          ## Advanced: Blind comparison


          For situations where you want a more rigorous comparison between two versions of a skill (e.g., the user asks
          "is the new version actually better?"), there's a blind comparison system. Read `agents/comparator.md` and
          `agents/analyzer.md` for the details. The basic idea is: give two outputs to an independent agent without
          telling it which is which, and let it judge quality. Then analyze why the winner won.


          This is optional, requires subagents, and most users won't need it. The human review loop is usually
          sufficient.


          ---


          ## Description Optimization


          The description field in SKILL.md frontmatter is the primary mechanism that determines whether Claude invokes
          a skill. After creating or improving a skill, offer to optimize the description for better triggering
          accuracy.


          ### Step 1: Generate trigger eval queries


          Create 20 eval queries — a mix of should-trigger and should-not-trigger. Save as JSON:


          ```json

          [
            {"query": "the user prompt", "should_trigger": true},
            {"query": "another prompt", "should_trigger": false}
          ]

          ```


          The queries must be realistic and something a Claude Code or Claude.ai user would actually type. Not abstract
          requests, but requests that are concrete and specific and have a good amount of detail. For instance, file
          paths, personal context about the user's job or situation, column names and values, company names, URLs. A
          little bit of backstory. Some might be in lowercase or contain abbreviations or typos or casual speech. Use a
          mix of different lengths, and focus on edge cases rather than making them clear-cut (the user will get a
          chance to sign off on them).


          Bad: `"Format this data"`, `"Extract text from PDF"`, `"Create a chart"`


          Good: `"ok so my boss just sent me this xlsx file (its in my downloads, called something like 'Q4 sales final
          FINAL v2.xlsx') and she wants me to add a column that shows the profit margin as a percentage. The revenue is
          in column C and costs are in column D i think"`


          For the **should-trigger** queries (8-10), think about coverage. You want different phrasings of the same
          intent — some formal, some casual. Include cases where the user doesn't explicitly name the skill or file type
          but clearly needs it. Throw in some uncommon use cases and cases where this skill competes with another but
          should win.


          For the **should-not-trigger** queries (8-10), the most valuable ones are the near-misses — queries that share
          keywords or concepts with the skill but actually need something different. Think adjacent domains, ambiguous
          phrasing where a naive keyword match would trigger but shouldn't, and cases where the query touches on
          something the skill does but in a context where another tool is more appropriate.


          The key thing to avoid: don't make should-not-trigger queries obviously irrelevant. "Write a fibonacci
          function" as a negative test for a PDF skill is too easy — it doesn't test anything. The negative cases should
          be genuinely tricky.


          ### Step 2: Review with user


          Present the eval set to the user for review using the HTML template:


          1. Read the template from `assets/eval_review.html`

          2. Replace the placeholders:
             - `__EVAL_DATA_PLACEHOLDER__` → the JSON array of eval items (no quotes around it — it's a JS variable assignment)
             - `__SKILL_NAME_PLACEHOLDER__` → the skill's name
             - `__SKILL_DESCRIPTION_PLACEHOLDER__` → the skill's current description
          3. Write to a temp file (e.g., `/tmp/eval_review_<skill-name>.html`) and open it: `open
          /tmp/eval_review_<skill-name>.html`

          4. The user can edit queries, toggle should-trigger, add/remove entries, then click "Export Eval Set"

          5. The file downloads to `~/Downloads/eval_set.json` — check the Downloads folder for the most recent version
          in case there are multiple (e.g., `eval_set (1).json`)


          This step matters — bad eval queries lead to bad descriptions.


          ### Step 3: Run the optimization loop


          Tell the user: "This will take some time — I'll run the optimization loop in the background and check on it
          periodically."


          Save the eval set to the workspace, then run in the background:


          ```bash

          python -m scripts.run_loop \
            --eval-set <path-to-trigger-eval.json> \
            --skill-path <path-to-skill> \
            --model <model-id-powering-this-session> \
            --max-iterations 5 \
            --verbose
          ```


          Use the model ID from your system prompt (the one powering the current session) so the triggering test matches
          what the user actually experiences.


          While it runs, periodically tail the output to give the user updates on which iteration it's on and what the
          scores look like.


          This handles the full optimization loop automatically. It splits the eval set into 60% train and 40% held-out
          test, evaluates the current description (running each query 3 times to get a reliable trigger rate), then
          calls Claude to propose improvements based on what failed. It re-evaluates each new description on both train
          and test, iterating up to 5 times. When it's done, it opens an HTML report in the browser showing the results
          per iteration and returns JSON with `best_description` — selected by test score rather than train score to
          avoid overfitting.


          ### How skill triggering works


          Understanding the triggering mechanism helps design better eval queries. Skills appear in Claude's
          `available_skills` list with their name + description, and Claude decides whether to consult a skill based on
          that description. The important thing to know is that Claude only consults skills for tasks it can't easily
          handle on its own — simple, one-step queries like "read this PDF" may not trigger a skill even if the
          description matches perfectly, because Claude can handle them directly with basic tools. Complex, multi-step,
          or specialized queries reliably trigger skills when the description matches.


          This means your eval queries should be substantive enough that Claude would actually benefit from consulting a
          skill. Simple queries like "read file X" are poor test cases — they won't trigger skills regardless of
          description quality.


          ### Step 4: Apply the result


          Take `best_description` from the JSON output and update the skill's SKILL.md frontmatter. Show the user
          before/after and report the scores.


          ---


          ### Package and Present (only if `present_files` tool is available)


          Check whether you have access to the `present_files` tool. If you don't, skip this step. If you do, package
          the skill and present the .skill file to the user:


          ```bash

          python -m scripts.package_skill <path/to/skill-folder>

          ```


          After packaging, direct the user to the resulting `.skill` file path so they can install it.


          ---


          ## Claude.ai-specific instructions


          In Claude.ai, the core workflow is the same (draft → test → review → improve → repeat), but because Claude.ai
          doesn't have subagents, some mechanics change. Here's what to adapt:


          **Running test cases**: No subagents means no parallel execution. For each test case, read the skill's
          SKILL.md, then follow its instructions to accomplish the test prompt yourself. Do them one at a time. This is
          less rigorous than independent subagents (you wrote the skill and you're also running it, so you have full
          context), but it's a useful sanity check — and the human review step compensates. Skip the baseline runs —
          just use the skill to complete the task as requested.


          **Reviewing results**: If you can't open a browser (e.g., Claude.ai's VM has no display, or you're on a remote
          server), skip the browser reviewer entirely. Instead, present results directly in the conversation. For each
          test case, show the prompt and the output. If the output is a file the user needs to see (like a .docx or
          .xlsx), save it to the filesystem and tell them where it is so they can download and inspect it. Ask for
          feedback inline: "How does this look? Anything you'd change?"


          **Benchmarking**: Skip the quantitative benchmarking — it relies on baseline comparisons which aren't
          meaningful without subagents. Focus on qualitative feedback from the user.


          **The iteration loop**: Same as before — improve the skill, rerun the test cases, ask for feedback — just
          without the browser reviewer in the middle. You can still organize results into iteration directories on the
          filesystem if you have one.


          **Description optimization**: This section requires the `claude` CLI tool (specifically `claude -p`) which is
          only available in Claude Code. Skip it if you're on Claude.ai.


          **Blind comparison**: Requires subagents. Skip it.


          **Packaging**: The `package_skill.py` script works anywhere with Python and a filesystem. On Claude.ai, you
          can run it and the user can download the resulting `.skill` file.


          **Updating an existing skill**: The user might be asking you to update an existing skill, not create a new
          one. In this case:

          - **Preserve the original name.** Note the skill's directory name and `name` frontmatter field -- use them
          unchanged. E.g., if the installed skill is `research-helper`, output `research-helper.skill` (not
          `research-helper-v2`).

          - **Copy to a writeable location before editing.** The installed skill path may be read-only. Copy to
          `/tmp/skill-name/`, edit there, and package from the copy.

          - **If packaging manually, stage in `/tmp/` first**, then copy to the output directory -- direct writes may
          fail due to permissions.


          ---


          ## Cowork-Specific Instructions


          If you're in Cowork, the main things to know are:


          - You have subagents, so the main workflow (spawn test cases in parallel, run baselines, grade, etc.) all
          works. (However, if you run into severe problems with timeouts, it's OK to run the test prompts in series
          rather than parallel.)

          - You don't have a browser or display, so when generating the eval viewer, use `--static <output_path>` to
          write a standalone HTML file instead of starting a server. Then proffer a link that the user can click to open
          the HTML in their browser.

          - For whatever reason, the Cowork setup seems to disincline Claude from generating the eval viewer after
          running the tests, so just to reiterate: whether you're in Cowork or in Claude Code, after running tests, you
          should always generate the eval viewer for the human to look at examples before revising the skill yourself
          and trying to make corrections, using `generate_review.py` (not writing your own boutique html code). Sorry in
          advance but I'm gonna go all caps here: GENERATE THE EVAL VIEWER *BEFORE* evaluating inputs yourself. You want
          to get them in front of the human ASAP!

          - Feedback works differently: since there's no running server, the viewer's "Submit All Reviews" button will
          download `feedback.json` as a file. You can then read it from there (you may have to request access first).

          - Packaging works — `package_skill.py` just needs Python and a filesystem.

          - Description optimization (`run_loop.py` / `run_eval.py`) should work in Cowork just fine since it uses
          `claude -p` via subprocess, not a browser, but please save it until you've fully finished making the skill and
          the user agrees it's in good shape.

          - **Updating an existing skill**: The user might be asking you to update an existing skill, not create a new
          one. Follow the update guidance in the claude.ai section above.


          ---


          ## Reference files


          The agents/ directory contains instructions for specialized subagents. Read them when you need to spawn the
          relevant subagent.


          - `agents/grader.md` — How to evaluate assertions against outputs

          - `agents/comparator.md` — How to do blind A/B comparison between two outputs

          - `agents/analyzer.md` — How to analyze why one version beat another


          The references/ directory has additional documentation:

          - `references/schemas.md` — JSON structures for evals.json, grading.json, etc.


          ---


          Repeating one more time the core loop here for emphasis:


          - Figure out what the skill is about

          - Draft or edit the skill

          - Run claude-with-access-to-the-skill on test prompts

          - With the user, evaluate the outputs:
            - Create benchmark.json and run `eval-viewer/generate_review.py` to help the user review them
            - Run quantitative evals
          - Repeat until you and the user are satisfied

          - Package the final skill and return it to the user.


          Please add steps to your TodoList, if you have such a thing, to make sure you don't forget. If you're in
          Cowork, please specifically put "Create evals JSON and run `eval-viewer/generate_review.py` so human can
          review test cases" in your TodoList to make sure it happens.


          Good luck!
