          # GitHub CLI (gh)


          Comprehensive reference for GitHub CLI (gh) - work seamlessly with GitHub from the command line.


          **Version:** 2.85.0 (current as of January 2026)


          ## Prerequisites


          ### Installation


          ```bash

          # macOS

          brew install gh


          # Linux

          curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg | sudo dd
          of=/usr/share/keyrings/githubcli-archive-keyring.gpg

          echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/githubcli-archive-keyring.gpg]
          https://cli.github.com/packages stable main" | sudo tee /etc/apt/sources.list.d/github-cli.list > /dev/null

          sudo apt update

          sudo apt install gh


          # Windows

          winget install --id GitHub.cli


          # Verify installation

          gh --version

          ```


          ### Authentication


          ```bash

          # Interactive login (default: github.com)

          gh auth login


          # Login with specific hostname

          gh auth login --hostname enterprise.internal


          # Login with token

          gh auth login --with-token < mytoken.txt


          # Check authentication status

          gh auth status


          # Switch accounts

          gh auth switch --hostname github.com --user username


          # Logout

          gh auth logout --hostname github.com --user username

          ```


          ### Setup Git Integration


          ```bash

          # Configure git to use gh as credential helper

          gh auth setup-git


          # View active token

          gh auth token


          # Refresh authentication scopes

          gh auth refresh --scopes write:org,read:public_key

