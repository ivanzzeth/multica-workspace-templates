          name: multica-agent-management

          description: Agent 全生命周期管理：指令、环境变量、技能引用、运行时配置的查看与修改。本地 .agents/ 与 multica
          平台双向同步。触发词：改agent、修改agent、更新agent、agent管理、agent update、agent配置、agent指令、agent
          instructions、agent环境变量、agent技能、agent同步、agent runtime、agent model、agent status。

          license: MIT

          ---


          # Agent 管理


          ## 本地文件结构


          ```

          .agents/agents/{name}/

          ├── AGENTS.md          # agent 完整指令

          ├── SKILL_REFERENCE.md # 引用的技能列表

          └── metadata.json      # id/name/description/status/model/max_concurrent_tasks

          .agents/skills/{name}/

          └── SKILL.md           # 技能内容

          ```


          ## 同步工作流


          **方向：multica → 本地 → 编辑 → multica**


          ### 1. 拉取（multica → 本地）


          ```bash

          # 拉取所有 agent

          multica agent list --output json | python3 -c "

          import json,sys

          for a in json.load(sys.stdin):
              with open(f'.agents/agents/{a[\"name\"]}/AGENTS.md','w') as f:
                  f.write(a['instructions'])
              with open(f'.agents/agents/{a[\"name\"]}/metadata.json','w') as f:
                  json.dump({k:a[k] for k in ['id','name','description','status','model','max_concurrent_tasks']},f,indent=2,ensure_ascii=False)
          "


          # 拉取指定 skill

          multica skill get <skill-id> --output json

          ```


          ### 2. 推送（本地 → multica）


          ```bash

          # 更新 agent 指令（从本地文件读取）

          multica agent update <id> --instructions "$(cat .agents/agents/<Name>/AGENTS.md)"


          # 更新 agent 描述

          multica agent update <id> --description "..."


          # 更新 agent model

          multica agent update <id> --model "..."


          # 更新 agent status

          multica agent update <id> --status "working"


          # 创建/更新 skill

          multica skill create --name "..." --description "..." --content "$(cat .agents/skills/<name>/SKILL.md)"

          multica skill update <id> --description "..." --content "$(cat .agents/skills/<name>/SKILL.md)"

          ```


          ## Agent 指令规范


          - 核心职责 ≤200 字

          - 总指令 ≤50 行

          - 详细规则引用 skill，不写在 instructions 里

          - 禁止硬编码 UUID

          - 禁止硬编码项目名/issue prefix


          ## 技能引用管理


          Agent 技能引用的增减通过 multica CLI 进行（当前 multica 版本通过 agent update --skills 或 skill 管理接口操作）。


          ## 技能创建规范


          按照 skill-creator 标准：

          - SKILL.md 必须有 frontmatter（name, description, license）

          - description 包含充足的触发词

          - 内容精简、可操作
