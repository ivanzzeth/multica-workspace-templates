          ---

          name: frontend-design

          description: Create distinctive, production-grade frontend interfaces with high design quality. Use this skill
          when the user asks to build web components, pages, artifacts, posters, or applications (examples include
          websites, landing pages, dashboards, React components, HTML/CSS layouts, or when styling/beautifying any web
