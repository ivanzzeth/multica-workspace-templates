  - name: multica-escalate
    description: Agent
      无法独立解决问题时的升级策略：自查→同级协助→技术负责人→人类用户。触发词：升级、escalate、无法解决、不知道、不确定、需要帮助、需要人类、人工介入、blocked、求助、L1、L2、L3、L4、升级策略、接手、移交。
    files:
      - path: SKILL.md
        content: |-
          ---
          name: multica-escalate
          description: Agent 无法独立解决问题时的升级策略：自查→同级协助→技术负责人→人类用户。触发词：升级、escalate、无法解决、不知道、不确定、需要帮助、需要人类、人工介入、blocked、求助、L1、L2、L3、L4、升级策略、接手、移交。
          license: MIT
          ---

          # 升级策略

          ## 升级级别

          ```
          L1 自查 → L2 同级 → L3 技术负责人 → L4 人类
          ```

          | 级别 | 动作 | 适用场景 |
          |------|------|---------|
          | **L1 自查** | 重读 issue、skill、错误日志 | 信息遗漏、理解偏差 |
          | **L2 同级** | @同能力 agent 复查 | Worker 间互助、Reviewer 间互助 |
          | **L3 负责人** | @Planner（流程/依赖问题） | 卡在状态推进、依赖关系不清 |
          | **L4 人类** | status=blocked + @人类 | 需人类决策/确认 |

          ## L4 升级模板

          ```
          multica issue status <id> blocked
          comment:
          阻塞：<具体问题>

          已尝试：
          1. <方案1> → <结果>
          2. <方案2> → <结果>

          需要决策：<明确写出需要人类决定什么>

          [@Name](mention://member/<uuid>)
          ```

          获取人类 UUID：`multica workspace members --output json`

          ## 升级前必修

          - 完整记录已尝试的方案
          - 附相关日志/错误信息
          - 明确写出需要什么决策，不要开放式提问

          ## 禁止行为

          - 假装完成/伪造结果
          - 跳过 L1-L3 直接 L4（除非明确只有人类能决定）
          - 阻塞后不 comment 原因
          - 在无关 issue 下升级

          ## 示例：Worker 遇到不熟悉的代码库

          ```
          L1: 读 issue description + 相关 skill
          L2: @另一个 Worker "这个模块你熟悉吗？"
          L3: @Planner "这个 issue 可能需要 Researcher 调研后再开发"
          L4: blocked + @人类 "仓库 X 的 API 文档缺失，需要人类提供"
          ```

          ## 示例：Reviewer 审查不确定

          ```
          L1: 重新读 multica-issue-management skill 中的审查规则
          L2: @QA "帮忙看下这个 PR 的安全性"
          L3: @Planner "这个 PR 涉及架构变更，建议升级审查"
          L4: blocked + @人类 "PR #X 的架构变更有风险，需人类确认"
          ```
  - name: multica-issue-management
    description: Issue 全生命周期管理协议：状态机、接力链、铁律、版本发布、阻塞处理。当任何 agent 需要处理 issue 状态变更、@mention 接力、版本发布、或任何涉及多 agent 协作的 issue
      操作时必须先加载此技能。触发词：issue、状态、状态机、接力、接力链、@mention、子issue、父issue、版本发布、Release
      PR、backlog、todo、in_progress、in_review、done、blocked、cancelled、铁律、QA规则、集成测试、验收、阻塞、打回。
    files:
      - path: SKILL.md
        content: >-
          ---

          name: multica-issue-management

          description: Issue 全生命周期管理协议：状态机、接力链、铁律、版本发布、阻塞处理。当任何 agent 需要处理 issue 状态变更、@mention 接力、版本发布、或任何涉及多 agent 协作的
          issue 操作时必须先加载此技能。触发词：issue、状态、状态机、接力、接力链、@mention、子issue、父issue、版本发布、Release
          PR、backlog、todo、in_progress、in_review、done、blocked、cancelled、铁律、QA规则、集成测试、验收、阻塞、打回。

          license: MIT

          ---


          # Issue 协作流程协议


          ## 0. 运行时获取 UUID


          禁止硬编码任何 agent UUID / skill ID / member ID。所有 ID 通过 CLI 实时获取：


          ```bash

          multica agent list --output json | python3 -c "import json,sys; print([(a['name'],a['id']) for a in
          json.load(sys.stdin)])"

          multica workspace members --output json

          multica skill list --output json | python3 -c "import json,sys; ids=[s['id'] for s in json.load(sys.stdin) if
          s['name']=='<skill-name>']; print(ids[0] if ids else '')"

          ```


          Mention 格式（必须用 Markdown 链接，纯文本 @Name 不触发 agent），必须确保name和agent uuid是对应的，不要张冠李戴：

          ```

          [@DisplayName](mention://agent/<agent-uuid>)

          ```


          ## 1. Issue 状态机


          ```

          backlog → todo → in_progress → in_review → done
                        ↑        ↓           ↓
                        +--- blocked ---+    |
                        ↑                   |
                        +------ 打回 -------+
          ```


          | 状态 | 含义 | 进入者 |

          |------|------|--------|

          | backlog | 已规划暂不执行 | Assistant |

          | todo | 可开始，等待领取 | Planner |

          | in_progress | 执行中 | Worker |

          | in_review | 待审查 | Worker(子issue) / Planner(父issue) |

          | blocked | 遇阻，需人类介入 | 任何 Agent |

          | done | 完成 | Reviewer(子issue) / 人类(父issue) |

          | cancelled | 取消 | Assistant/Planner |


          ## 2. 分类型处理规则


          | Issue 类型 | 提交流程 | 谁审查 |

          |-----------|---------|--------|

          | 子 issue（有父issue） | Worker → in_review + @Reviewer | Reviewer 直接审查 |

          | 父 issue（版本发布） | 全部子 done → Planner → @QA | QA 集成测试 → Planner 建 Release PR → 人类合并 |


          **不存在普通 issue（无父 issue）这种类型。** 所有开发 issue 都是某个父 issue 的子 issue。


          ## 3. @mention 接力链


          ### 子 issue: Worker → Reviewer → Planner

          ```

          Worker 完成 → PR → in_review → @Reviewer

          Reviewer 审查通过 → 合并 PR 到版本分支 → done → @Planner

          Reviewer 不通过 → 打回 in_progress → @Worker

          ```


          ### 父 issue: Planner → QA → Planner → 人类

          ```

          全部子 done → Planner 检测 → 父 in_review → @QA

          QA 集成测试 + 最终 review → 通过 → @Planner

          QA 不通过 → @Worker(责任方) + in_progress

          Planner 接到 QA 通过 → 建 Release PR(版本→main) → @人类

          人类 合并 Release PR + git tag → 父 done

          ```


          ## 4. 核心铁律


          1. **子 issue 跳过 QA**：子 issue 开发完成直接 @Reviewer，Reviewer 审查代码质量 + 合并 PR

          2. **Release PR 必须人类合并**：任何 Agent 不得合并版本分支→main 的 PR

          3. **父 issue done 仅人类设置**：合并 Release PR + git tag 后由人类或平台标记 done

          4. **打回必须改状态为 in_progress**：否则 issue 卡在 in_review

          5. **QA 报告结论必须与数据一致**：任何 Fail → 不通过；阻塞性 Warning → 不通过

          6. **所有 UUID 运行时获取**：发 @mention 前必须 `multica agent list --output json`

          7. **版本分支不存在 → blocked**：禁止 silent fallback 到 main

          8. **Release PR 链接写入父 issue description**：comment 会被淹没，description 是固定元信息


          ## 5. 阻塞规则


          需要人类介入时：

          ```

          multica issue status <id> blocked

          comment: 阻塞：<原因> + [@Name](mention://member/<uuid>) + 已尝试方案

          ```

          人类解答后，负责人确认无异议 → status=in_progress 继续。除了负责人之外，禁止挪动阻塞状态的issue。


          ## 6. Comment 规范


          | 场景 | 格式 |

          |------|------|

          | 开始开发 | `开始 [issue 标题]。` |

          | 提审（子 issue） | `已完成。PR: <链接>` + `[@Reviewer](mention://agent/<uuid>)` + status→in_review |

          | Reviewer 通过 | `审查通过，已合并。` + `[@Planner](mention://agent/<uuid>)` + status→done |

          | Reviewer 打回 | `审查不通过：<原因>` + `[@Worker](mention://agent/<uuid>)` + status→in_progress |

          | QA 通过（父 issue） | `QA 集成测试通过。` + `[@Planner](mention://agent/<uuid>)` |

          | QA 打回 | `QA 未通过：<原因>` + `[@Worker](mention://agent/<uuid>)` + status→in_progress |

          | Planner 建 Release PR | `版本验收通过。Release PR: <链接>` + `[@Name](mention://member/<uuid>)` |

          | 阻塞 | `阻塞：<原因>` + `[@Name](mention://member/<uuid>)` + status→blocked |

          | 解除阻塞 | `阻塞已解除：<说明>` + status→todo |


          ## 7. Agent 角色速查


          | Agent | 职责 | 核心技能 |

          |-------|------|---------|

          | Assistant | 需求→issue、工作区管理、故障时协调 | 全部技能 |

          | Planner | 推进+分配+版本分支+Release PR+卡住协调 | multica-issue-management, multica-pr, multica-escalate |

          | Worker | 开发+调研 | multica-issue-management, multica-pr, multica-escalate + 所有非multica技能 |

          | QA | 父 issue 集成测试+最终 review | Reviewer 全部技能 + multica-issue-management, multica-escalate |

          | Reviewer | 子 issue 代码 review+合并 PR | review 技能 + multica-issue-management, multica-escalate |
